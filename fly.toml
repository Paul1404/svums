app = "svums"
primary_region = "fra"

[build]

[env]
  CORS_ORIGINS = "https://svums.sv-untereuerheim.de"
  COOKIE_SECURE = "true"
  COOKIE_NAME = "svums_admin_session"
  # DATABASE_URL, ADMIN_PASSWORD, COOKIE_SECRET → set via:
  # flyctl secrets set DATABASE_URL="postgresql://..." ADMIN_PASSWORD="..." COOKIE_SECRET="..."

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "10s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
