app = "svums"
primary_region = "fra"

kill_signal = "SIGTERM"
kill_timeout = 10
swap_size_mb = 512

[build]

[env]
  CORS_ORIGINS = "https://svums.sv-untereuerheim.de"
  COOKIE_SECURE = "true"
  COOKIE_NAME = "svums_admin_session"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "10s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
