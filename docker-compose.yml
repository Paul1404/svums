# Simple standalone docker-compose — just run `docker compose up -d`
# Copy .env.example to .env and fill in your values first.

services:
  svums:
    build: .
    container_name: svums
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    env_file: .env
    environment:
      - COOKIE_SECURE=false
      - CORS_ORIGINS=http://localhost:${PORT:-8000}
      - PUBLIC_BASE_URL=http://localhost:${PORT:-8000}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - data:/app/data

volumes:
  data:
    name: svums_data
